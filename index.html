<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0b;--bg2:#111113;--surface:rgba(255,255,255,.04);
  --glass:rgba(255,255,255,.06);--glass-border:rgba(255,255,255,.08);
  --text:#e8e6e3;--text-dim:#7a7773;--text-muted:#4a4845;
  --accent:#c8b89a;--accent-dim:rgba(200,184,154,.15);
  --radius:16px;--radius-sm:10px;
  --font-display:'Syne',sans-serif;--font-body:'Outfit',sans-serif;
  --transition:cubic-bezier(.22,1,.36,1);
}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--text-muted) transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:var(--bg)}

.loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s var(--transition),visibility .8s}
.loader.done{opacity:0;visibility:hidden;pointer-events:none}
.loader-inner{display:flex;gap:6px}
.loader-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:ldot 1.4s ease-in-out infinite}
.loader-dot:nth-child(2){animation-delay:.15s}.loader-dot:nth-child(3){animation-delay:.3s}
@keyframes ldot{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 clamp(24px,4vw,60px);height:72px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,11,.6);backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);border-bottom:1px solid var(--glass-border);transition:transform .5s var(--transition)}
nav.hide{transform:translateY(-100%)}
.nav-logo{font-family:var(--font-display);font-weight:700;font-size:1.05rem;letter-spacing:-.02em;color:var(--text)}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:.82rem;font-weight:400;color:var(--text-dim);text-decoration:none;letter-spacing:.04em;text-transform:uppercase;position:relative;transition:color .35s}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--accent);transition:width .4s var(--transition)}
.nav-links a:hover{color:var(--text)}.nav-links a:hover::after{width:100%}
.nav-burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px}
.nav-burger span{width:22px;height:1.5px;background:var(--text);transition:all .35s var(--transition)}

.hero{position:relative;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-slides{position:absolute;inset:0}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.8s ease,transform 8s linear;transform:scale(1.08)}
.hero-slide.active{opacity:1;transform:scale(1)}
.hero-slide img{width:100%;height:100%;object-fit:cover;filter:brightness(.35) saturate(.85)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,11,.3) 0%,rgba(10,10,11,.1) 40%,rgba(10,10,11,.85) 100%)}
.hero-content{position:relative;z-index:2;text-align:center;padding:0 24px}
.hero-eyebrow{font-size:.72rem;font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;opacity:0;transform:translateY(20px);animation:fadeUp 1s .6s var(--transition) forwards}
.hero-name{font-family:var(--font-display);font-size:clamp(2.8rem,8vw,7rem);font-weight:800;letter-spacing:-.04em;line-height:.95;margin-bottom:16px;opacity:0;transform:translateY(30px);animation:fadeUp 1s .8s var(--transition) forwards}
.hero-tag{font-size:clamp(.85rem,1.4vw,1.05rem);font-weight:300;color:var(--text-dim);letter-spacing:.06em;opacity:0;transform:translateY(20px);animation:fadeUp 1s 1s var(--transition) forwards}
.hero-scroll{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeUp 1s 1.4s var(--transition) forwards}
.hero-scroll span{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted)}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--accent),transparent);animation:scrollPulse 2s ease-in-out infinite}
@keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

section{padding:clamp(80px,12vh,160px) clamp(24px,5vw,80px)}
.section-label{font-size:.68rem;font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
.section-title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,3rem);font-weight:700;letter-spacing:-.03em;margin-bottom:48px}

.filter-bar{display:flex;gap:8px;margin-bottom:48px;flex-wrap:wrap}
.filter-btn{padding:8px 20px;border:1px solid var(--glass-border);border-radius:100px;background:transparent;color:var(--text-dim);font-family:var(--font-body);font-size:.78rem;letter-spacing:.03em;cursor:pointer;transition:all .35s var(--transition)}
.filter-btn:hover,.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.gallery{columns:3;column-gap:16px}
.gallery-item{break-inside:avoid;margin-bottom:16px;position:relative;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;opacity:0;transform:translateY(40px)}
.gallery-item.visible{opacity:1;transform:translateY(0);transition:opacity .8s var(--transition),transform .8s var(--transition)}
.gallery-item img{width:100%;display:block;transition:transform .7s var(--transition),filter .7s var(--transition)}
.gallery-item::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,11,.5) 0%,transparent 50%);opacity:0;transition:opacity .5s}
.gallery-item:hover img{transform:scale(1.04);filter:brightness(1.1)}
.gallery-item:hover::after{opacity:1}
.gallery-item .item-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px;z-index:1;opacity:0;transform:translateY(8px);transition:all .5s var(--transition)}
.gallery-item:hover .item-overlay{opacity:1;transform:translateY(0)}
.item-overlay span{font-size:.72rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase}

.lightbox{position:fixed;inset:0;z-index:200;background:rgba(5,5,6,.92);backdrop-filter:blur(60px);-webkit-backdrop-filter:blur(60px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .5s var(--transition)}
.lightbox.open{opacity:1;visibility:visible}
.lightbox-img{max-width:88vw;max-height:85vh;object-fit:contain;border-radius:var(--radius);transform:scale(.92);opacity:0;transition:all .5s var(--transition) .1s}
.lightbox.open .lightbox-img{transform:scale(1);opacity:1}
.lightbox-close{position:absolute;top:28px;right:32px;width:44px;height:44px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .3s}
.lightbox-close:hover{background:rgba(255,255,255,.12)}
.lightbox-close svg{width:18px;height:18px;stroke:var(--text);stroke-width:2}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .3s}
.lightbox-nav:hover{background:rgba(255,255,255,.12)}
.lightbox-nav svg{width:18px;height:18px;stroke:var(--text);stroke-width:2}
.lightbox-prev{left:24px}.lightbox-next{right:24px}
.lightbox-counter{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-size:.75rem;color:var(--text-muted);letter-spacing:.1em}
.lightbox-title{position:absolute;bottom:56px;left:50%;transform:translateX(-50%);font-size:.8rem;color:var(--text-dim);letter-spacing:.06em}

.about-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:clamp(40px,6vw,100px);align-items:center}
.about-portrait{position:relative;border-radius:var(--radius);overflow:hidden;aspect-ratio:3/4}
.about-portrait img{width:100%;height:100%;object-fit:cover;filter:brightness(.9) saturate(.9)}
.about-portrait::after{content:'';position:absolute;inset:0;border:1px solid var(--glass-border);border-radius:var(--radius);pointer-events:none}
.about-text p{font-size:clamp(.92rem,1.2vw,1.05rem);line-height:1.8;color:var(--text-dim);font-weight:300;margin-bottom:20px}
.about-text p:first-of-type::first-line{color:var(--text);font-weight:400}
.about-stats{display:flex;gap:40px;margin-top:36px;padding-top:28px;border-top:1px solid var(--glass-border)}
.stat{text-align:left}
.stat-num{font-family:var(--font-display);font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:.7rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

.contact-inner{max-width:600px;margin:0 auto;text-align:center}
.contact-inner p{font-size:clamp(.92rem,1.2vw,1.05rem);color:var(--text-dim);font-weight:300;line-height:1.8;margin-bottom:40px}
.contact-email{display:inline-flex;align-items:center;gap:10px;padding:16px 36px;border-radius:100px;background:var(--glass);border:1px solid var(--glass-border);color:var(--text);font-family:var(--font-body);font-size:.9rem;text-decoration:none;letter-spacing:.02em;transition:all .4s var(--transition)}
.contact-email:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.contact-email svg{width:16px;height:16px;stroke:currentColor;stroke-width:2}
.contact-socials{display:flex;justify-content:center;gap:16px;margin-top:28px}
.contact-socials a{width:44px;height:44px;border-radius:50%;border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;color:var(--text-dim);text-decoration:none;transition:all .35s var(--transition)}
.contact-socials a:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.contact-socials a svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}

footer{padding:40px clamp(24px,5vw,80px);border-top:1px solid var(--glass-border);display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:var(--text-muted);letter-spacing:.04em}
footer a{color:var(--text-dim);text-decoration:none;transition:color .3s}
footer a:hover{color:var(--accent)}

.reveal{opacity:0;transform:translateY(32px);transition:opacity .9s var(--transition),transform .9s var(--transition)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.1s}.reveal-delay-2{transition-delay:.2s}.reveal-delay-3{transition-delay:.3s}

@media(max-width:900px){
  .gallery{columns:2}
  .about-grid{grid-template-columns:1fr;gap:40px}
  .about-portrait{max-width:320px}
}
@media(max-width:640px){
  nav{padding:0 20px;height:64px}
  .nav-links{display:none;position:fixed;inset:0;background:rgba(10,10,11,.96);backdrop-filter:blur(40px);flex-direction:column;align-items:center;justify-content:center;gap:36px}
  .nav-links.open{display:flex}
  .nav-links a{font-size:1.1rem}
  .nav-burger{display:flex}
  .gallery{columns:1;column-gap:12px}
  .gallery-item{margin-bottom:12px}
  .about-stats{gap:24px}
  .lightbox-prev{left:12px}.lightbox-next{right:12px}
  .lightbox-nav{width:40px;height:40px}
  section{padding:clamp(60px,10vh,120px) 20px}
}

body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px;mix-blend-mode:screen}
</style>
</head>

<script>
(function buildSite() {
  const C = CONFIG;

  /* ── Nav Logo ── */
  const firstName = C.name.split(' ')[0];
  document.getElementById('navLogo').innerHTML = firstName + '<span>.</span>';

  /* ── Hero ── */
  document.getElementById('heroName').textContent = C.name;
  document.getElementById('heroTag').textContent  = C.tagline;

  const slidesEl = document.getElementById('heroSlides');
  C.heroSlides.forEach((src, i) => {
    const d = document.createElement('div');
    d.className = 'hero-slide' + (i === 0 ? ' active' : '');
    d.innerHTML = '<img src="' + src + '" alt="Hero slide">';
    slidesEl.appendChild(d);
  });

  /* ── Filter Buttons ── */
  const filterBar = document.getElementById('filterBar');
  C.categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (i === 0 ? ' active' : '');
    btn.dataset.filter = cat.toLowerCase();
    btn.textContent = cat;
    filterBar.appendChild(btn);
  });

  /* ── Gallery Items ── */
  const gallery = document.getElementById('gallery');
  C.gallery.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'gallery-item';
    d.dataset.cat = item.category.toLowerCase();
    d.dataset.index = i;
    d.innerHTML =
      '<img src="' + item.src + '" alt="' + item.title + '" loading="lazy">' +
      '<div class="item-overlay"><span>' + item.title + '</span></div>';
    gallery.appendChild(d);
  });

  /* ── About Section ── */
  document.getElementById('aboutPortrait').innerHTML =
    '<img src="' + C.about.portrait + '" alt="' + C.name + '">';

  let aboutHTML =
    '<div class="section-label reveal">About</div>' +
    '<h2 class="section-title reveal reveal-delay-1">The Photographer</h2>';
  C.about.bio.forEach(p => {
    aboutHTML += '<p class="reveal reveal-delay-2">' + p + '</p>';
  });
  aboutHTML += '<div class="about-stats reveal reveal-delay-3">';
  C.about.stats.forEach(s => {
    aboutHTML +=
      '<div class="stat">' +
        '<div class="stat-num">' + s.number + '</div>' +
        '<div class="stat-label">' + s.label + '</div>' +
      '</div>';
  });
  aboutHTML += '</div>';
  document.getElementById('aboutText').innerHTML = aboutHTML;

  /* ── Contact Section ── */
  const icons = {
    instagram: '<svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>',
    behance:   '<svg viewBox="0 0 24 24"><path d="M3 3h6c2.2 0 4 1.8 4 4 0 1.5-.8 2.8-2 3.4 1.6.7 2.7 2.3 2.7 4.1C13.7 17 11.7 19 9.3 19H3V3zm5.5 6.5c1.1 0 2-.7 2-1.8s-.9-1.7-2-1.7H5.5v3.5H8.5zM9 16.5c1.2 0 2.2-.8 2.2-2s-1-2-2.2-2H5.5v4H9zM15 4h6v1.5h-6zM18 8c2.5 0 4.5 2 4.5 4.5v.8H16c.2 1.6 1.5 2.7 3 2.7 1 0 1.8-.4 2.3-1.1h2.3c-.7 2-2.5 3.4-4.6 3.4-2.8 0-5-2.2-5-5S15.2 8 18 8zm-2 3.8h4.3C20 10.5 19.1 9.8 18 9.8c-1.2 0-2.1.7-2.3 2z"/></svg>',
  };

  let contactHTML =
    '<div class="section-label reveal">Get in Touch</div>' +
    '<h2 class="section-title reveal reveal-delay-1">Let\'s Connect</h2>' +
    '<p class="reveal reveal-delay-2">Interested in collaboration, licensing, or just want to say hello? I\'d love to hear from you.</p>' +
    '<a href="mailto:' + C.email + '" class="contact-email reveal reveal-delay-3">' +
      '<svg viewBox="0 0 24 24" fill="none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' +
      C.email +
    '</a>' +
    '<div class="contact-socials reveal reveal-delay-3">';
  Object.entries(C.socials).forEach(function(pair) {
    if (pair[1] && icons[pair[0]]) {
      contactHTML += '<a href="' + pair[1] + '" target="_blank" rel="noopener" aria-label="' + pair[0] + '">' + icons[pair[0]] + '</a>';
    }
  });
  contactHTML += '</div>';
  document.getElementById('contactInner').innerHTML = contactHTML;

  /* ── Footer ── */
  document.getElementById('footerCopy').innerHTML = '&copy; ' + C.copyright + '. All rights reserved.';
})();


/* ═══════════════════════════════════════
   INTERACTIONS — animations & behaviors
   ═══════════════════════════════════════ */

/* Loader */
window.addEventListener('load', function() {
  setTimeout(function() { document.getElementById('loader').classList.add('done'); }, 600);
});

/* Hero Slideshow */
(function() {
  var slides = document.querySelectorAll('.hero-slide');
  if (slides.length < 2) return;
  var cur = 0;
  setInterval(function() {
    slides[cur].classList.remove('active');
    cur = (cur + 1) % slides.length;
    slides[cur].classList.add('active');
  }, 6000);
})();

/* Nav Auto-Hide */
(function() {
  var last = 0, nav = document.getElementById('nav');
  window.addEventListener('scroll', function() {
    var y = window.scrollY;
    nav.classList.toggle('hide', y > last && y > 200);
    last = y;
  }, { passive: true });
})();

/* Mobile Nav */
document.getElementById('burger').addEventListener('click', function() {
  document.getElementById('navLinks').classList.toggle('open');
});
document.querySelectorAll('#navLinks a').forEach(function(a) {
  a.addEventListener('click', function() {
    document.getElementById('navLinks').classList.remove('open');
  });
});

/* Scroll Reveal */
(function() {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal, .gallery-item').forEach(function(el) { obs.observe(el); });
})();

/* Category Filter */
(function() {
  var btns = document.querySelectorAll('.filter-btn');
  var items = document.querySelectorAll('.gallery-item');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      btns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var f = btn.dataset.filter;
      items.forEach(function(item) {
        var show = f === 'all' || item.dataset.cat === f;
        item.style.display = show ? '' : 'none';
        if (show) {
          item.classList.remove('visible');
          requestAnimationFrame(function() {
            requestAnimationFrame(function() { item.classList.add('visible'); });
          });
        }
      });
    });
  });
})();

/* Lightbox */
(function() {
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lbImg');
  var lbCounter = document.getElementById('lbCounter');
  var lbTitle = document.getElementById('lbTitle');
  var visible = [], idx = 0;

  function getVisible() {
    return Array.from(document.querySelectorAll('.gallery-item')).filter(function(i) {
      return i.style.display !== 'none';
    });
  }

  function show() {
    var item = visible[idx];
    lbImg.src = item.querySelector('img').src;
    lbTitle.textContent = CONFIG.gallery[parseInt(item.dataset.index)].title;
    lbCounter.textContent = (idx + 1) + ' / ' + visible.length;
  }

  function open(i) {
    visible = getVisible();
    idx = i;
    show();
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function close() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lbClose').addEventListener('click', close);
  lb.addEventListener('click', function(e) { if (e.target === lb) close(); });
  document.getElementById('lbPrev').addEventListener('click', function() {
    idx = (idx - 1 + visible.length) % visible.length; show();
  });
  document.getElementById('lbNext').addEventListener('click', function() {
    idx = (idx + 1) % visible.length; show();
  });
  document.addEventListener('keydown', function(e) {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft')  { idx = (idx - 1 + visible.length) % visible.length; show(); }
    if (e.key === 'ArrowRight') { idx = (idx + 1) % visible.length; show(); }
  });

  document.getElementById('gallery').addEventListener('click', function(e) {
    var item = e.target.closest('.gallery-item');
    if (!item) return;
    open(getVisible().indexOf(item));
  });
})();

/* Parallax Hero */
window.addEventListener('scroll', function() {
  var y = window.scrollY;
  if (y < window.innerHeight) {
    document.getElementById('heroSlides').style.transform = 'translateY(' + (y * 0.35) + 'px)';
    var content = document.querySelector('.hero-content');
    content.style.transform = 'translateY(' + (y * 0.15) + 'px)';
    content.style.opacity = 1 - y / (window.innerHeight * 0.8);
  }
}, { passive: true });
</script>
</body>
